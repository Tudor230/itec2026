services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: itec2026
      POSTGRES_USER: itec
      POSTGRES_PASSWORD: itec
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U itec -d itec2026']
      interval: 5s
      timeout: 5s
      retries: 5

  dockerd:
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ''
    command:
      - --host=tcp://0.0.0.0:2375
      - --host=unix:///var/run/docker.sock
    healthcheck:
      test: ['CMD', 'docker', 'info']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - dockerd_data:/var/lib/docker
      - server_workspaces_data:/data/workspaces

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    command: npm run start:docker
    environment:
      PORT: 4000
      DATABASE_URL: postgres://itec:itec@postgres:5432/itec2026
      CLIENT_ORIGIN: http://localhost:3000
      COLLAB_TERMINAL_DOCKER_IMAGE: node:20.0
      FILES_STORAGE_ROOT: /data/files
      COLLAB_WORKSPACE_ROOT: /data/workspaces
      DOCKER_HOST: tcp://dockerd:2375
      COLLAB_DOCKER_LOG_LEVEL: debug
      COLLAB_TERMINAL_DOCKER_AUTO_PULL: 'true'
      COLLAB_TERMINAL_DOCKER_UID: '1000'
      COLLAB_TERMINAL_DOCKER_GID: '1000'
      COLLAB_WORKSPACE_EXCLUDED_DIRS: node_modules,.git,dist,build,.next,coverage,.cache
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-itec2026.eu.auth0.com}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-https://itec2026-api}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_TIMEOUT_MS: ${DEEPSEEK_TIMEOUT_MS:-30000}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
    depends_on:
      postgres:
        condition: service_healthy
      dockerd:
        condition: service_healthy
    ports:
      - '4000:4000'
    volumes:
      - server_files_data:/data/files
      - server_workspaces_data:/data/workspaces

  client:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    environment:
      VITE_AUTH0_DOMAIN: itec2026.eu.auth0.com
      VITE_AUTH0_CLIENT_ID: cuWoOEt45nXf53pMBpi1jzDsRwRKO1IB
      VITE_AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-https://itec2026-api}
      VITE_AUTH0_REDIRECT_URI: http://localhost:3000
      VITE_AUTH0_LOGOUT_RETURN_TO: http://localhost:3000
      VITE_AUTH0_ROLES_CLAIM: https://itec2026-api/roles
    depends_on:
      - server
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  dockerd_data:
  server_files_data:
  server_workspaces_data:
